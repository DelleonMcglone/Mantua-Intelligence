<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mantua.AI — Prototype</title>
<meta name="viewport" content="width=1400" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /*EDITMODE-BEGIN*/
  /* Tweaks JSON lives in script, not CSS. see below */
  /*EDITMODE-END*/

  :root {
    --bg: #000000;
    --bg-elev: #0a0a0d;
    --panel: #0f0f14ee;
    --panel-solid: #0e0e13;
    --border: #22222a;
    --border-soft: #1a1a20;
    --text: #ffffff;
    --text-dim: #8e8e96;
    --text-mute: #5a5a62;
    --accent: #8b6cf0;         /* primary purple — same in both themes */
    --accent-2: #b892ff;       /* soft purple for subtle fills */
    --amber: #f5a524;          /* chart line */
    --amber-dim: #f5a52433;
    --green: #3ddc97;
    --red: #ff6b6b;
    --chip: #18181e;
    --row-hover: #121217;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 8px;
    --density: 1;  /* 1 = comfortable, 0.82 = compact */
  }
  html[data-theme="light"] {
    --bg: #f6f5f2;
    --bg-elev: #ffffff;
    --panel: #ffffffee;
    --panel-solid: #ffffff;
    --border: #e5e3dd;
    --border-soft: #efece5;
    --text: #1a1a24;
    --text-dim: #5a5d72;
    --text-mute: #8a8da0;
    --accent: #8b6cf0;         /* primary purple — same in both themes */
    --accent-2: #6e4fe0;
    --amber: #e08900;
    --amber-dim: #e0890033;
    --green: #14a87a;
    --red: #d34848;
    --chip: #f0ede5;
    --row-hover: #f0ede5;
  }

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; font-feature-settings: "ss01", "cv11"; }
  body { min-height: 100vh; }
  button { font-family: inherit; color: inherit; }
  input, textarea { font-family: inherit; color: inherit; }

  .mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: "zero"; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-mute); }

  #root { min-height: 100vh; }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweak state for host -->
<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "dark",
    "density": "comfortable"
  }/*EDITMODE-END*/;
  window.__TWEAKS__ = { ...TWEAK_DEFAULTS };
</script>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>
<script type="text/babel" src="src/panels.jsx"></script>
<script type="text/babel" src="src/panels_more.jsx"></script>
<script type="text/babel" src="src/chat.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

</body>
</html>
