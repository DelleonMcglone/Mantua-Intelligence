name: Contracts (Base Sepolia fork)

# P9-002 — Foundry test suite for the contracts/ workspace.
#
# Runs on every PR / push to main against the live Base Sepolia chain
# via fork. The fork URL is taken from the `BASE_SEPOLIA_RPC_URL`
# secret if present; otherwise falls back to the public endpoint
# (rate-limited but works for the small fanout these tests need).
#
# Lives separately from `ci.yml` because Foundry needs its own
# install + cache strategy and the runtime is meaningfully different
# (network-bound forks vs. pure-JS unit tests).

on:
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forge-test:
    name: forge test (Base Sepolia fork)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    env:
      # Public Base Sepolia endpoint for fork tests. Override via repo
      # secret BASE_SEPOLIA_RPC_URL when rate-limit becomes an issue.
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL || 'https://sepolia.base.org' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show Foundry versions
        run: forge --version

      # `contracts/lib/` is gitignored — local devs run these install
      # commands once (see `contracts/README.md`). The CI workflow was
      # missing the step, so every previous run failed with "Source not
      # found" on `v4-core/`, `forge-std/`, `solmate/`, etc. The same
      # install has to be re-run inside each hook submodule because
      # submodules also gitignore their own `lib/` and the parent build
      # pulls submodule source in via the
      # `hooks/stable-protection/:` remapping.
      - name: Install Foundry deps (parent)
        run: |
          forge install foundry-rs/forge-std --no-git --no-commit
          forge install OpenZeppelin/openzeppelin-contracts --no-git --no-commit
          forge install Uniswap/v4-core --no-git --no-commit
          forge install Uniswap/v4-periphery --no-git --no-commit
          forge install transmissions11/solmate --no-git --no-commit

      - name: Install Foundry deps (stable-protection submodule)
        working-directory: contracts/hooks/stable-protection
        run: |
          if [ -f foundry.toml ]; then
            forge install foundry-rs/forge-std --no-git --no-commit || true
            forge install Uniswap/v4-core --no-git --no-commit || true
            forge install Uniswap/v4-periphery --no-git --no-commit || true
            forge install transmissions11/solmate --no-git --no-commit || true
          fi

      - name: Install Foundry deps (dynamic-fee submodule)
        working-directory: contracts/hooks/dynamic-fee
        run: |
          if [ -f foundry.toml ]; then
            forge install foundry-rs/forge-std --no-git --no-commit || true
            forge install Uniswap/v4-core --no-git --no-commit || true
            forge install Uniswap/v4-periphery --no-git --no-commit || true
            forge install transmissions11/solmate --no-git --no-commit || true
          fi

      - name: Build contracts
        run: forge build --sizes

      # The full-lifecycle E2E + the hook-bytecode baseline are the
      # gating tests. They pass against current Sepolia state and
      # exercise the entire user-facing flow (create → add → swap →
      # remove) as well as all four hook deployments.
      #
      # Wrapped in a 3-attempt retry because the public
      # `https://sepolia.base.org` endpoint occasionally returns
      # Cloudflare 502s under fanout. Set the BASE_SEPOLIA_RPC_URL
      # secret to a dedicated provider (Alchemy / Infura / QuickNode
      # free tier) to drop the retry overhead.
      - name: Run gating fork tests (must pass)
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "::group::forge test attempt $attempt"
            if forge test --match-contract "HookBaseline|FullLifecycleE2E" -vv; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; sleeping 15s before retry…"
            sleep 15
          done
          exit 1

      # The remaining per-hook E2Es depend on Base Sepolia state
      # (DynamicFee TWAP warmup, etc.) and can flake on chain drift.
      # Run them as advisory so they surface in logs without blocking
      # the PR. RWAGate / AsyncLimitOrder tests were removed in PR
      # #100 (MVP scope-down); only the two retained hooks remain.
      - name: Run advisory per-hook fork tests
        continue-on-error: true
        run: |
          forge test \
            --match-contract "StableProtectionE2E|DynamicFeeE2E" \
            -vv
